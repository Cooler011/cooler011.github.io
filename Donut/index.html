<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cooler01s Website</title>

<link rel="icon" type="image/png" href="/SNOW.png">
<link rel="apple-touch-icon" href="/SNOW.png">
<link rel="manifest" href="/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cooler01">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">

<style>
html,
body {
    margin: 0;
    width: 100%;
    min-height: 100%;
    overflow: hidden;
    background: black;
}

body {
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;

    width: 100vw;
    height: 100vh;
    height: 100dvh;

    font-family: monospace;
}

pre {
    margin: 0;

    font-size: 12px;

    line-height: 1;

    letter-spacing: 0;

    white-space: pre;

    transform: scale(1.12, 1.18);

    transform-origin: center;
}

#back {
    position: fixed;
    top: 20px;
    left: 20px;

    color: white;
    text-decoration: none;

    font-family: monospace;
    font-size: 20px;

    z-index: 9999;
}

#back:hover {
    text-decoration: underline;
}

@media (max-width: 700px) {
    pre {
        font-size: 7px;
        transform: scale(1);
    }

    #back {
        top: 15px;
        left: 15px;
        font-size: 20px;
    }
}

@media (max-width: 380px) {
    pre {
        font-size: 6px;
    }
}

@media (max-height: 500px) {
    pre {
        font-size: 6px;
        transform: scale(1);
    }
}
</style>
</head>
<body>

<a href="/" id="back">Back</a>

<pre id="donut"></pre>

<script>
const pre = document.getElementById("donut");

let A = 0;
let B = 0;

const width = 80;
const height = 22;

function renderDonut() {

    const b = [];
    const z = [];

    for (let i = 0; i < width * height; i++) {
        b[i] = " ";
        z[i] = 0;
    }

    for (let j = 0; j < 6.28; j += 0.07) {

        for (let i = 0; i < 6.28; i += 0.02) {

            const c = Math.sin(i);
            const d = Math.cos(j);
            const e = Math.sin(A);
            const f = Math.sin(j);
            const g = Math.cos(A);

            const h = d + 2;

            const D =
                1 / (c * h * e + f * g + 5);

            const l = Math.cos(i);
            const m = Math.cos(B);
            const n = Math.sin(B);

            const t =
                c * h * g - f * e;

            const x = Math.floor(
                40 + 30 * D * (
                    l * h * m - t * n
                )
            );

            const y = Math.floor(
                12 + 15 * D * (
                    l * h * n + t * m
                )
            );

            const o = x + width * y;

            const N = Math.floor(
                8 * (
                    (f * e - c * d * g) * m
                    - c * d * e
                    - f * g
                    - l * d * n
                )
            );

            if (
                y >= 0 &&
                y < height &&
                x >= 0 &&
                x < width &&
                D > z[o]
            ) {

                z[o] = D;

                b[o] =
                    ".,-~:;=!*#$@"[
                        N > 0 ? N : 0
                    ];
            }
        }
    }

    let output = "";

    for (let k = 0; k < width * height; k++) {

        output += b[k];

        if (k % width === width - 1) {
            output += "\n";
        }
    }

    pre.textContent = output;

    A += 0.04;
    B += 0.02;
}

setInterval(renderDonut, 30);

renderDonut();
</script>

</body>
</html>
