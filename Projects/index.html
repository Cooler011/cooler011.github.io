<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cooler01s Website!</title>



<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cooler01">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3584e4">

<style>

@font-face {
  font-family: "LucidaGrande";
  src: url("../font1.ttf") format("truetype");
}

:root {
  --primary: hsl(213, 79%, 56%);
  --light: hsl(181, 95%, 92%);
}

html {
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;

  background-image: url("../BGsnow.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;

  font-family: "LucidaGrande", Helvetica, Arial, sans-serif;
  color: white;

  overflow-x: hidden;

  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.content {
  padding-top: 40px;
  animation: fadeIn 1s ease;
}

.site-title {
  text-align: center;
  font-size: 42px;
  margin-top: 10px;
  margin-bottom: 10px;

  text-shadow:
    0 1px 0 rgba(255,255,255,0.4),
    0 2px 8px rgba(0,0,0,0.7);
}

.welcome-text {
  text-align: center;
  font-size: 20px;
  margin-top: 0;
  margin-bottom: 40px;

  text-shadow:
    0 1px 0 rgba(255,255,255,0.3),
    0 2px 6px rgba(0,0,0,0.7);
}

.project-link {
  display: block;
  width: fit-content;
  margin: auto;
}

.project-logo {
  display: block;

  width: 220px;
  height: auto;

  margin: auto;

  filter:
    drop-shadow(0 0 20px rgba(0,0,0,0.6));

  transition:
    transform 0.2s ease,
    filter 0.2s ease;

  cursor: pointer;
}

.project-logo:hover {
  transform: scale(1.05);
}

.project-logo:active {
  filter:
    brightness(0.8)
    drop-shadow(0 0 20px rgba(0,0,0,0.6));
}

.back-button-container {
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

.aqua-button {
  font-family: inherit;
  font-size: 13px;
  font-weight: 400;
  color: black;
  text-decoration: none;

  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  background-image:
    linear-gradient(hsl(0 0% 100% / 0.85), transparent 10px),
    linear-gradient(hsl(0 0% 100% / 0.25) 10px, transparent 10px),
    radial-gradient(circle at 10px 5px, hsl(0 0% 100% / 0.25) 5px, transparent 5px),
    radial-gradient(circle at 0px 5px, hsl(0 0% 100% / 0.25) 5px, transparent 5px),
    linear-gradient(var(--primary), var(--light));

  padding: 0.6em 3em;

  background-size:
    100%,
    calc(100% - 20px),
    10px 10px,
    10px 10px,
    100%;

  background-position:
    top,
    top center,
    top left,
    top right,
    center;

  background-repeat: no-repeat;

  border-radius: 100vw;
  position: relative;

  cursor: pointer;
}

.aqua-button:active {
  box-shadow:
    inset 0 0 30px rgba(0,0,0,0.55);
}

.aqua-button::before {
  content: "";
  position: absolute;
  z-index: -1;
  inset: -1px;
  margin-inline: auto;

  background: linear-gradient(
    hsl(240, 74%, 30%),
    hsl(0, 0%, 38%)
  );

  border-radius: 100vw;
}

/* Mobile */

@media (max-width: 700px) {

  html,
  body {
    overflow-x: hidden;
  }

  body {
    background-attachment: scroll;
  }

  .content {
    padding-top: 30px;
    padding-left: 1rem;
    padding-right: 1rem;
  }

  .project-logo {
    width: 180px;
  }

  .aqua-button {
    width: 280px;
    max-width: 100%;
    box-sizing: border-box;
    text-align: center;
  }
}

</style>
</head>

<body>

<div class="content">

<h1 class="site-title">My Projects</h1>

<p class="welcome-text">Some cool things I made</p>

<a class="project-link" href="https://linkmii.org/" target="_blank">
  <img class="project-logo" src="https://linkmii.org/logo.png" alt="LinkMii">
</a>

<div class="back-button-container">
  <a class="aqua-button" href="/">Back</a>
</div>

</div>

</body>
</html>
