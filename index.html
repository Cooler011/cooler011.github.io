<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cooler01s Website!</title>

<link rel="icon" type="image/png" href="SNOW.png">

<style>

@font-face {
    font-family: "LucidaGrande";
    src: url("font1.ttf") format("truetype");
}

:root {
    --primary: hsl(213, 79%, 56%);
    --light: hsl(181, 95%, 92%);
}

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    min-height: 100vh;
}

body {
    font-family: "LucidaGrande", Helvetica, Arial, sans-serif;
    color: white;

    background-image: url("BGsnow.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #000;

    overflow-x: hidden;

    display: flex;
    flex-direction: column;
    align-items: center;

    padding: 20px;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.site-title {
    text-align: center;
    font-size: 42px;
    margin-top: 10px;
    margin-bottom: 10px;

    text-shadow:
        0 1px 0 rgba(255,255,255,0.4),
        0 2px 8px rgba(0,0,0,0.7);

    animation: fadeIn 1s ease;
}

.welcome-text {
    text-align: center;
    font-size: 20px;
    margin-top: 0;
    margin-bottom: 40px;

    text-shadow:
        0 1px 0 rgba(255,255,255,0.3),
        0 2px 6px rgba(0,0,0,0.7);

    animation: fadeIn 1.3s ease;
}

.button-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;

    animation: fadeIn 1.6s ease;
}

.aqua-link {
    text-decoration: none;
}

button {
    font-family: inherit;
    font-size: 13px;
    font-weight: 400;
    color: black;

    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;

    background-image:
        linear-gradient(hsl(0 0% 100% / 0.85), transparent 10px),
        linear-gradient(hsl(0 0% 100% / 0.25) 10px, transparent 10px),
        radial-gradient(circle at 10px 5px, hsl(0 0% 100% / 0.25) 5px, transparent 5px),
        radial-gradient(circle at 0px 5px, hsl(0 0% 100% / 0.25) 5px, transparent 5px),
        linear-gradient(var(--primary), var(--light));

    padding: 0.6em 3em;

    background-size:
        100%,
        calc(100% - 20px),
        10px 10px,
        10px 10px,
        100%;

    background-position:
        top,
        top center,
        top left,
        top right,
        center;

    background-repeat: no-repeat;

    border: 0;
    border-radius: 100vw;
    position: relative;
    cursor: pointer;

    min-width: 150px;
}

button::before {
    content: "";
    position: absolute;
    inset: -1px;
    z-index: -1;

    background: linear-gradient(
        hsl(240, 74%, 30%),
        hsl(0, 0%, 38%)
    );

    border-radius: 100vw;
}

button:active {
    box-shadow:
        inset 0 0 30px rgba(0,0,0,0.55);
}

/* Mobile */

@media (max-width: 600px) {

    .site-title {
        font-size: 32px;
    }

    .welcome-text {
        font-size: 18px;
        margin-bottom: 30px;
    }

    .button-container {
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 18px;
    }

    .aqua-link {
        width: 100%;
        max-width: 320px;
    }

    button {
        width: 100%;
        font-size: 18px;
        padding: 0.8em 2em;
    }
}

</style>
</head>

<body>

<h1 class="site-title">Cooler01s Website!</h1>

<p class="welcome-text">Welcome to my Website!</p>

<div class="button-container">

    <a class="aqua-link" href="/Socials/">
        <button>Socials</button>
    </a>

    <a class="aqua-link" href="/Projects/">
        <button>Projects</button>
    </a>

    <a class="aqua-link" href="/Goodies/">
        <button>Goodies</button>
    </a>

</div>

</body>
</html>
