<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cooler01s Website!</title>

<link rel="icon" type="image/png" href="SNOW.png">
<link rel="apple-touch-icon" href="SNOW.png">
<link rel="manifest" href="/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cooler01">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3584e4">

<style>

@font-face {
  font-family: "LucidaGrande";
  src: url("font1.ttf") format("truetype");
}

:root {
  --primary: hsl(213, 79%, 56%);
  --light: hsl(181, 95%, 92%);
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

html {
  min-height: 100%;
}

body {
  margin: 2rem;
  min-height: calc(100vh - 4rem);

  background-image: url("BGsnow.png");
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;
  background-attachment: fixed;

  font-family: "LucidaGrande", Helvetica, Arial, sans-serif;
  color: white;

  overflow-x: hidden;

  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;

  animation: fadeIn 1s ease;
}

.site-title {
  text-align: center;
  font-size: 42px;
  margin-top: 10px;
  margin-bottom: 10px;

  text-shadow:
    0 1px 0 rgba(255,255,255,0.4),
    0 2px 8px rgba(0,0,0,0.7);
}

.welcome-text {
  text-align: center;
  font-size: 20px;
  margin-top: 0;
  margin-bottom: 40px;

  text-shadow:
    0 1px 0 rgba(255,255,255,0.3),
    0 2px 6px rgba(0,0,0,0.7);
}

.button-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

.aqua-link {
  text-decoration: none;
}

button {
  font-family: inherit;
  font-size: 13px;
  font-weight: 400;
  color: black;

  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  background-image:
    linear-gradient(hsl(0 0% 100% / 0.85), transparent 10px),
    linear-gradient(hsl(0 0% 100% / 0.25) 10px, transparent 10px),
    radial-gradient(circle at 10px 5px, hsl(0 0% 100% / 0.25) 5px, transparent 5px),
    radial-gradient(circle at 0px 5px, hsl(0 0% 100% / 0.25) 5px, transparent 5px),
    linear-gradient(var(--primary), var(--light));

  padding: 0.6em 3em;

  background-size:
    100%,
    calc(100% - 20px),
    10px 10px,
    10px 10px,
    100%;

  background-position:
    top,
    top center,
    top left,
    top right,
    center;

  background-repeat: no-repeat;

  border: 0;
  border-radius: 100vw;
  position: relative;
  cursor: pointer;
}

button:active {
  box-shadow:
    inset 0 0 30px rgba(0,0,0,0.55);
}

button::before {
  content: "";
  position: absolute;
  z-index: -1;
  inset: -1px;
  margin-inline: auto;

  background: linear-gradient(
    hsl(240, 74%, 30%),
    hsl(0, 0%, 38%)
  );

  border-radius: 100vw;
}

/* MOBILE */

@media (max-width: 700px) {

  html,
  body {
    overflow-x: hidden;
  }

  body {
    margin: 1rem;

    /* Fixes iOS Safari background issues */
    background-attachment: scroll;
  }

  .button-container {
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .aqua-link {
    width: 280px;
  }

  .aqua-link button {
    width: 100%;
  }
}

</style>
</head>

<body>

<h1 class="site-title">Cooler01s Website!</h1>

<p class="welcome-text">Welcome to my Website!</p>

<div class="button-container">

  <a class="aqua-link" href="/Socials/">
    <button>Socials</button>
  </a>

  <a class="aqua-link" href="/Projects/">
    <button>Projects</button>
  </a>

  <a class="aqua-link" href="/Goodies/">
    <button>Goodies</button>
  </a>

</div>

</body>
</html>
